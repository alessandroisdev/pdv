<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debras POS | Terminal Offline Livre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden flex flex-col">

    <!-- OVERLAY DE LOGIN NÚMERICO (PIN) -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-96 max-w-full relative">
            
            <div class="text-center mb-6">
                <i class="fa fa-cash-register text-4xl text-indigo-600 mb-3"></i>
                <h2 class="text-2xl font-bold text-slate-800">Operador de Caixa</h2>
                <p class="text-xs text-slate-500 font-bold mt-1">SISTEMA FRENTE DE CAIXA OFFLINE</p>
            </div>
            
            <div id="login-error" class="hidden mb-4 p-3 bg-red-100 text-red-700 font-bold text-sm rounded border-l-4 border-red-500 text-center">
                PIN Incorreto ou não autorizado.
            </div>

            <!-- Display do PIN -->
            <div class="mb-6">
                <div class="w-full bg-slate-100 p-4 border-2 border-slate-300 rounded-lg text-center h-16 flex items-center justify-center">
                    <span id="pin-display" class="text-3xl tracking-[1em] font-black text-indigo-600 ml-4"></span>
                </div>
                <input type="hidden" id="login-pin" value="">
            </div>

            <!-- Teclado Numérico (Numpad) -->
            <div class="grid grid-cols-3 gap-3 mb-6">
                <button onclick="PosApp.typePin(1)" class="h-14 bg-white border border-slate-200 rounded-lg shadow-sm text-2xl font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 active:bg-slate-100 transition">1</button>
                <button onclick="PosApp.typePin(2)" class="h-14 bg-white border border-slate-200 rounded-lg shadow-sm text-2xl font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 active:bg-slate-100 transition">2</button>
                <button onclick="PosApp.typePin(3)" class="h-14 bg-white border border-slate-200 rounded-lg shadow-sm text-2xl font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 active:bg-slate-100 transition">3</button>
                
                <button onclick="PosApp.typePin(4)" class="h-14 bg-white border border-slate-200 rounded-lg shadow-sm text-2xl font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 active:bg-slate-100 transition">4</button>
                <button onclick="PosApp.typePin(5)" class="h-14 bg-white border border-slate-200 rounded-lg shadow-sm text-2xl font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 active:bg-slate-100 transition">5</button>
                <button onclick="PosApp.typePin(6)" class="h-14 bg-white border border-slate-200 rounded-lg shadow-sm text-2xl font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 active:bg-slate-100 transition">6</button>
                
                <button onclick="PosApp.typePin(7)" class="h-14 bg-white border border-slate-200 rounded-lg shadow-sm text-2xl font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 active:bg-slate-100 transition">7</button>
                <button onclick="PosApp.typePin(8)" class="h-14 bg-white border border-slate-200 rounded-lg shadow-sm text-2xl font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 active:bg-slate-100 transition">8</button>
                <button onclick="PosApp.typePin(9)" class="h-14 bg-white border border-slate-200 rounded-lg shadow-sm text-2xl font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 active:bg-slate-100 transition">9</button>
                
                <button onclick="PosApp.clearPin()" class="h-14 bg-red-50 border border-red-200 rounded-lg shadow-sm text-lg font-bold text-red-600 hover:bg-red-100 active:bg-red-200 transition"><i class="fa fa-eraser"></i> Limpar</button>
                <button onclick="PosApp.typePin(0)" class="h-14 bg-white border border-slate-200 rounded-lg shadow-sm text-2xl font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 active:bg-slate-100 transition">0</button>
                <button onclick="PosApp.authenticate()" class="h-14 bg-emerald-500 rounded-lg shadow-md text-white font-bold hover:bg-emerald-600 active:bg-emerald-700 transition"><i class="fa fa-check"></i> Entrar</button>
            </div>

            <div class="mt-4 text-center">
                <span class="text-xs text-slate-400 font-bold">Servidor API: <span class="text-indigo-400">ONLINE</span></span>
            </div>
        </div>
    </div>

    <!-- HEADER / STATUS BAR -->
    <header class="bg-indigo-700 text-white p-3 flex justify-between items-center shadow-md z-10">
        <div class="flex items-center gap-3">
            <i class="fa fa-shopping-cart text-xl"></i>
            <span class="font-bold text-lg tracking-wider">CAIXA LIVRE</span>
            <span class="bg-indigo-800 px-2 py-1 rounded text-xs font-bold font-mono ml-2">CX-01</span>
        </div>
        <div class="flex items-center gap-4 text-sm font-bold">
            <span id="operador-nome"><i class="fa fa-user-circle"></i> Não Autenticado</span>
            
            <button onclick="PosApp.syncWithCloud()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 border border-indigo-400 rounded transition" title="Sincronizar Lote com a Matriz">
                <i class="fa fa-cloud-upload-alt mr-1"></i> <span id="sync-counter">0 Vendas Offline</span>
            </button>

            <!-- Network Status Indicador -->
            <span id="net-status" class="bg-emerald-500 text-white px-2 py-1 rounded">
                <i class="fa fa-wifi"></i> ONLINE
            </span>
        </div>
    </header>

    <!-- CONTENT -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- CATÁLOGO DE PRODUTOS -->
        <main class="flex-1 bg-slate-50 p-4 flex flex-col">
            <div class="mb-4 flex gap-2">
                <input type="text" id="search-product" placeholder="Pesquisar Produto ou bipe Código de Barras EAN..." class="flex-1 p-3 rounded shadow-sm border border-slate-200 font-bold text-lg" onkeyup="PosApp.filterProducts(this.value)">
                <button class="bg-white px-4 rounded shadow-sm border border-slate-200 text-slate-600 hover:bg-slate-100 font-bold">
                    <i class="fa fa-barcode"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto">
                <div id="catalog-grid" class="product-grid">
                    <!-- Cards de Produtos Injetados via Renderizador JS -->
                </div>
            </div>
        </main>

        <!-- CARRINHO (CUPOM FISCAL) -->
        <aside class="w-96 bg-white border-l border-slate-200 flex flex-col shadow-[-4px_0_15px_rgba(0,0,0,0.05)] z-0">
            <div class="p-4 border-b border-dashed border-slate-300 bg-slate-50 text-center">
                <h3 class="font-bold text-slate-700">CUPOM FISCAL EMITIDO</h3>
                <div class="text-xs text-slate-400 font-mono mt-1">Consumidor Padrão</div>
            </div>

            <div class="flex-1 overflow-y-auto p-2" id="cart-items">
                <!-- Itens Pressionados -->
            </div>

            <div class="p-4 border-t border-slate-200 bg-slate-100">
                <div class="flex justify-between items-center mb-4 text-slate-600 font-bold">
                    <span>Qtd Itens</span>
                    <span id="cart-qty" class="font-mono">0</span>
                </div>
                <div class="flex justify-between items-end mb-4">
                    <span class="text-xl font-bold text-slate-700">TOTAL</span>
                    <span id="cart-total" class="text-3xl font-black text-emerald-600 tracking-tighter">R$ 0,00</span>
                </div>

                <div class="grid grid-cols-2 gap-2 mb-2">
                    <button onclick="PosApp.checkout('PIX')" class="py-3 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded font-bold shadow-sm hover:bg-emerald-100">PIX</button>
                    <button onclick="PosApp.checkout('CREDIT')" class="py-3 bg-blue-50 text-blue-700 border border-blue-200 rounded font-bold shadow-sm hover:bg-blue-100">Cartão</button>
                </div>
                <button onclick="PosApp.checkout('CASH')" class="w-full py-4 bg-emerald-600 text-white font-black text-lg rounded shadow-md mt-1 hover:bg-emerald-700 uppercase tracking-widest">
                    <i class="fa fa-money-bill-wave mr-2"></i> Receber Dinheiro
                </button>
            </div>
        </aside>

    </div>

    <!-- ALERTA DE OVERLAY (Toast) -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-800 text-white px-4 py-3 rounded shadow-lg font-bold transition-opacity duration-300 opacity-0 pointer-events-none">
        Mensagem
    </div>

    <!-- LOGICA DO PDV (Vanilla JS para que não precise usar Webpack e complique C++ Webviews) -->
    <script src="renderer.js"></script>

</body>
</html>
