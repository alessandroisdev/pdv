<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cupom Termal</title>
    <style>
        @page { margin: 0; }
        body {
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            color: #000;
            width: 300px; /* Compatível com Bobina 80mm */
            margin: 0;
            padding: 10px;
            background: #fff;
        }
        h2 { font-size: 16px; text-align: center; margin: 0 0 5px 0; }
        p { margin: 2px 0; }
        .text-center { text-align: center; }
        .border-bottom { border-bottom: 1px dashed #000; padding-bottom: 5px; margin-bottom: 5px; }
        .border-top { border-top: 1px dashed #000; padding-top: 5px; margin-top: 5px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { text-align: left; padding: 2px 0; font-size: 11px; }
        th.right, td.right { text-align: right; }
        th.center, td.center { text-align: center; }
        
        #items-container tr td { vertical-align: top; }
        .title-col { max-width: 140px; word-wrap: break-word; }

        .total-line { font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="border-bottom text-center">
        <h2>DEBRAS ENTERPRISE</h2>
        <p>CNPJ: 00.000.000/0001-00</p>
        <p>Rua do Varejo Inovador, 100</p>
        <p>CEP: 80000-000 - Curitiba/PR</p>
    </div>

    <div class="border-bottom">
        <p class="flex-between"><span>Data:</span> <span id="date-label">-</span></p>
        <p class="flex-between"><span>Série/Seq:</span> <span id="id-label">-</span></p>
        <p class="flex-between"><span>Operador:</span> <span id="operator-label">-</span></p>
    </div>

    <div class="text-center"><b>CUPOM NÃO FISCAL</b></div>

    <table class="border-top border-bottom">
        <thead>
            <tr>
                <th>Item</th>
                <th class="center">Qtd</th>
                <th class="right">Vl.Un</th>
                <th class="right">Vl.Tot</th>
            </tr>
        </thead>
        <tbody id="items-table">
            <!-- Interceptado pelo IPC do Node.JS C++ -->
        </tbody>
    </table>

    <div class="flex-between border-bottom">
        <span>Qtd. Total de Itens:</span>
        <span id="qty-label" style="font-weight:bold;">0</span>
    </div>

    <div class="flex-between total-line">
        <span>TOTAL R$</span>
        <span id="total-label">0.00</span>
    </div>
    
    <div class="flex-between">
        <span>Forma de Pgmto:</span>
        <span id="method-label">-</span>
    </div>

    <div class="border-top text-center" style="margin-top: 15px;">
        <p>Obrigado pela preferência!</p>
        <p>Powered by Debras ERP</p>
    </div>

    <script>
        // Esta função global é exposta pro main.js poder injetar os dados sem React/Webpack (Puro DOM injection rápido)
        window.fillReceipt = function(data) {
            document.getElementById('date-label').innerText = new Date().toLocaleString('pt-BR');
            document.getElementById('id-label').innerText = data.id;
            document.getElementById('operator-label').innerText = data.operator || 'Caixa Local';
            
            let htmlInner = '';
            let totalQty = 0;
            data.items.forEach(item => {
                const totalItem = (item.price_cents_sale * item.qty) / 100;
                const unItem = item.price_cents_sale / 100;
                totalQty += item.qty;
                
                htmlInner += `
                <tr>
                    <td class="title-col">${item.name}</td>
                    <td class="center">${item.qty}</td>
                    <td class="right">${unItem.toFixed(2)}</td>
                    <td class="right">${totalItem.toFixed(2)}</td>
                </tr>`;
            });
            
            document.getElementById('items-table').innerHTML = htmlInner;
            document.getElementById('qty-label').innerText = totalQty;
            
            // Format Total
            document.getElementById('total-label').innerText = (data.total / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            
            let methodStr = 'DINHEIRO';
            if (data.method === 'PIX') methodStr = 'PAGAMENTO PIX';
            if (data.method === 'CREDIT') methodStr = 'CARTÃO DE CRÉDITO';
            document.getElementById('method-label').innerText = methodStr;
        };
    </script>
</body>
</html>
