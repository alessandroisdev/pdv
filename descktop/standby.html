<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage Standby</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black;
            overflow: hidden;
            cursor: none; /* Hide cursor in kiosk standby mode */
        }
        #media-container {
            width: 100%; height: 100%;
            position: relative;
        }
        .media-slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out; /* Fade Master */
            z-index: 1;
        }
        .media-slide.active {
            opacity: 1;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div id="media-container"></div>

    <script>
        const { ipcRenderer } = require('electron');
        const mediaContainer = document.getElementById('media-container');

        let medias = [];
        let currentIndex = 0;
        let slideTimeout = null;

        ipcRenderer.on('load-signage-medias', (event, loadedMedias) => {
            medias = loadedMedias;
            if (medias.length > 0) {
                renderMedias();
                playNext();
            }
        });

        function renderMedias() {
            mediaContainer.innerHTML = '';
            medias.forEach((media, index) => {
                let elem;
                if (media.type === 'VIDEO') {
                    elem = document.createElement('video');
                    elem.src = 'file://' + media.file_path; // Local File URI caching!! No Latency!
                    elem.muted = true; // Necessário para Autoplay 100%
                    elem.loop = false; // Nós controlamos o playNext
                } else {
                    elem = document.createElement('img');
                    elem.src = 'file://' + media.file_path;
                }
                
                elem.className = 'media-slide';
                elem.id = `media-${index}`;
                mediaContainer.appendChild(elem);

                if (media.type === 'VIDEO') {
                    elem.addEventListener('ended', () => {
                        playNext(); // Quando video termina, avança logico ao invez de usar duration_seconds
                    });
                }
            });
        }

        function playNext() {
            if (medias.length === 0) return;
            
            // Remove active de todos
            document.querySelectorAll('.media-slide').forEach(el => el.classList.remove('active'));

            const currentMedia = medias[currentIndex];
            const currentElem = document.getElementById(`media-${currentIndex}`);
            
            currentElem.classList.add('active');

            if (slideTimeout) clearTimeout(slideTimeout);

            if (currentMedia.type === 'VIDEO') {
                currentElem.currentTime = 0;
                currentElem.play().catch(e => {
                    console.log('Autoplay prevent error?', e);
                    slideTimeout = setTimeout(playNext, 5000); // Fallback
                });
            } else {
                // Imagem Fade In aguarda N segundos nativos
                slideTimeout = setTimeout(playNext, currentMedia.duration_seconds * 1000);
            }

            // Move o indiciador para o prxímo circular
            currentIndex = (currentIndex + 1) % medias.length;
        }

        // Report any mousemove inside the standby context immediately back to main process
        document.addEventListener('mousemove', () => {
            ipcRenderer.send('user-activity');
        });
        document.addEventListener('keydown', () => {
            ipcRenderer.send('user-activity');
        });
        document.addEventListener('click', () => {
            ipcRenderer.send('user-activity');
        });
    </script>
</body>
</html>
